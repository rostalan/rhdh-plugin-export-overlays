name: Export Workspace as Dynamic Plugins Packages
on:
  workflow_call:
    secrets:
      image-registry-user:
        description: User name to be used to push to container image registry
        required: false

      image-registry-password:
        description: Password to be used to push to container image registry
        required: false

    inputs:
      node-version:
        description: node-version to execute the export
        type: string
        required: false

      janus-cli-version:
        description: Version of the janus-idp/cli package.
        type: string
        required: false
        
      cli-package:
        description: Cli package to be used for the export.
        type: string
        required: false

      upload-project-on-error:
        description: Upload the complete project as a workflow artifact in case of error in order to troubleshoot.
        required: false
        type: boolean
        default: false
      
      workspace-path:
        description: Relative path of a single workspace on which the export workflow should be applied.
        required: false
        type: string
        default: ''

      overlay-branch:
        description: Branch of the overlay structure (current branch by default).
        type: string
        required: false
        default: ''

      publish-container:
        description: Publish a container image for the dynamic plugins
        required: true
        type: boolean

      image-repository-prefix:
        description: Repository prefix of the dynamic plugin container images
        type: string
        required: false

      last-publish-commit:
        description: Optional commit ID of the last successful publishing of plugin container images
        type: string
        required: false

    outputs:
      published-exports:
        description: "List of successfully published dynamic plugin container images"
        value: ${{ jobs.export.outputs.published-exports }}
      failed-exports:
        description: "List of plugins that failed during export or image push"
        value: ${{ jobs.export.outputs.failed-exports }}
      published-exports-b64:
        description: "Base64 of published-exports to avoid masking"
        value: ${{ jobs.encode.outputs.published-exports-b64 }}
      failed-exports-b64:
        description: "Base64 of failed-exports to avoid masking"
        value: ${{ jobs.encode.outputs.failed-exports-b64 }}

  workflow_dispatch:
    inputs:
      node-version:
        description: node-version to execute the export
        type: string
        required: false
        default: ''

      janus-cli-version:
        description: Version of the janus-idp/cli package.
        type: string
        required: false
        default: ''
      
      cli-package:
        description: Cli package to be used for the export.
        type: string
        required: false
        default: ''

      upload-project-on-error:
        description: Upload the complete project as a workflow artifact in case of error in order to troubleshoot.
        required: false
        type: boolean
        default: false
      
      workspace-path:
        description: Relative path of a single workspace on which the export workflow should be applied.
        required: false
        type: string

      overlay-branch:
        description: Branch of the overlay structure
        type: string
        required: true

      publish-container:
        description: Publish a container image for the dynamic plugins
        required: false
        type: boolean
        default: false   

      image-repository-prefix:
        description: Repository prefix of the dynamic plugin container images
        type: string
        required: false
  
      last-publish-commit:
        description: Optional commit ID of the last successful publishing of plugin container images
        type: string
        required: false
  
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    uses: redhat-developer/rhdh-plugin-export-utils/.github/workflows/export-workspaces-as-dynamic.yaml@main 
    # https://github.com/redhat-developer/rhdh-plugin-export-utils/blob/main/.github/workflows/export-workspaces-as-dynamic.yaml
    with:
      node-version: ${{ inputs.node-version }}
      janus-cli-version: ${{ inputs.janus-cli-version }}
      cli-package: ${{ inputs.cli-package }}
      upload-project-on-error: ${{ inputs.upload-project-on-error }}
      overlay-branch: ${{ inputs.overlay-branch }}
      workspace-path: ${{ inputs.workspace-path }}
      publish-container: ${{ inputs.publish-container }}
      image-repository-prefix: ${{ inputs.image-repository-prefix }}
      
    secrets:
      image-registry-user: ${{ secrets.image-registry-user || github.actor }}
      image-registry-password: ${{ secrets.image-registry-password || secrets.GITHUB_TOKEN }}

    permissions:
      contents: write
      attestations: write
      packages: write
      id-token: write

  encode:
    needs: export
    runs-on: ubuntu-latest
    outputs:
      published-exports-b64: ${{ steps.set.outputs.published_b64 }}
      failed-exports-b64:    ${{ steps.set.outputs.failed_b64 }}
    steps:
      - name: Encode refs to base64
        id: set
        shell: bash
        run: |
          echo "::group::Collect export outputs"
          pub='${{ needs.export.outputs.published-exports }}'
          fail='${{ needs.export.outputs.failed-exports }}'
          pub_lines=$(printf '%s' "$pub" | sed '/^$/d' | wc -l | tr -d ' ')
          fail_lines=$(printf '%s' "$fail" | sed '/^$/d' | wc -l | tr -d ' ')
          echo "published-exports non-empty lines: $pub_lines"
          echo "failed-exports    non-empty lines: $fail_lines"
          echo "::endgroup::"

          pub_b64=$(printf '%s' "$pub" | base64 -w0)
          fail_b64=$(printf '%s' "$fail" | base64 -w0)

          echo "published_b64=$pub_b64" >> "$GITHUB_OUTPUT"
          echo "failed_b64=$fail_b64" >> "$GITHUB_OUTPUT"

          {
            echo "Export refs summary:";
            echo "- published lines: $pub_lines";
            echo "- failed lines:    $fail_lines";
          } >> "$GITHUB_STEP_SUMMARY"

  upload-refs-artifact:
    needs: export
    runs-on: ubuntu-latest
    steps:
      - name: Write refs files
        shell: bash
        run: |
          mkdir -p refs
          printf '%s\n' '${{ needs.export.outputs.published-exports }}' > refs/published.txt
          printf '%s\n' '${{ needs.export.outputs.failed-exports }}' > refs/failed.txt
          echo "::group::Refs files overview"
          wc -l refs/* || true
          echo "::endgroup::"
      - name: Upload refs artifact
        uses: actions/upload-artifact@v4
        with:
          name: export-refs
          path: refs
        # add a brief note for the job summary
      - name: Summarize refs artifact
        if: always()
        run: |
          {
            echo "Export refs artifact uploaded:";
            echo "- files: refs/published.txt, refs/failed.txt";
          } >> "$GITHUB_STEP_SUMMARY"